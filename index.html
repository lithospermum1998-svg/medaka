<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDAKA LOG</title>
    <style>
        :root {
            --bg-aqua-dark: #050a14;
            --card-bg: #0f172a;
            --text-main: #e2e8f0;
            --accent-water: #38bdf8;      /* 混泳：水色 */
            --accent-breeding: #fbbf24;   /* 選抜：ゴールド */
            --status-healthy: #2dd4bf;
        }

        body {
            background-color: var(--bg-aqua-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        .sync-time {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* メイン水槽サマリー */
        .summary-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .summary-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .total-count {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .unit { font-size: 1rem; opacity: 0.7; }

        /* 個別カード */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 5px solid var(--accent-water);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 選抜モードのカード */
        .card.selection {
            border-left-color: var(--accent-breeding);
        }

        .breed-name {
            font-size: 1.1rem;
            font-weight: bold;
            display: block;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        .count-area { text-align: right; }
        
        .update-btn {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid #444;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 style="font-size: 1.5rem; margin: 0;">MEDAKA LOG</h1>
        <span class="sync-time">Last Sync: 9:25</span>
    </div>

    <div class="summary-card">
        <span class="summary-title">MAIN TANK (MIXED)</span>
        <div class="total-count">
            <span class="unit">≈</span> 120 <span class="unit">pcs</span>
        </div>
        <div style="font-size: 0.8rem; color: var(--status-healthy);">● Status: Stable</div>
    </div>

    <h2 style="font-size: 1rem; opacity: 0.8;">PORTFOLIO</h2>

    <div class="card selection">
        <div>
            <span class="breed-name">レックウザ</span>
            <span class="tag" style="color: var(--accent-breeding);">選抜繁殖中</span>
        </div>
        <div class="count-area">
            <div style="font-size: 1.2rem; font-weight: bold;">8 <span class="unit">pcs</span></div>
            <div style="font-size: 0.7rem; color: var(--accent-breeding);">Ready to Spawn</div>
        </div>
    </div>

    <div class="card">
        <div>
            <span class="breed-name">黒豆</span>
            <span class="tag">メイン水槽混泳</span>
        </div>
        <div class="count-area">
            <div style="font-size: 1.2rem; font-weight: bold;">25 <span class="unit">pcs</span></div>
            <div style="font-size: 0.7rem; color: var(--accent-water);">Total: +2.4%</div>
        </div>
    </div>

    <button class="update-btn">↻ update</button>

</body>
</html>
