<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDAKA LOG</title>
    <style>
        :root {
            --bg-depth: #030712;       /* 深い水底 */
            --glass-panel: rgba(15, 23, 42, 0.7); /* 半透明の層 */
            --accent-selection: #fbbf24; /* 選抜個体を照らす光 */
            --accent-main: #38bdf8;      /* 混泳水槽の静かな青 */
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top, #0f172a 0%, var(--bg-depth) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px 16px 100px 16px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            padding: 0 4px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .last-sync {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* メイン水槽サマリー */
        .main-summary {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .summary-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-main);
            display: block;
            margin-bottom: 8px;
        }

        .summary-count {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .unit { font-size: 1rem; opacity: 0.5; margin-left: 4px; }

        /* グリッドレイアウト */
        .medaka-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* 個別タイル */
        .medaka-tile {
            background: var(--glass-panel);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            transition: transform 0.2s ease;
        }

        /* 選抜モードの強調 */
        .medaka-tile.selection {
            border-top: 4px solid var(--accent-selection);
            background: rgba(251, 191, 36, 0.03);
        }

        .status-tag {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }

        .breed-name {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .observation {
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tile-footer {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            align-items: baseline;
        }

        .tile-count {
            font-size: 1.4rem;
            font-weight: 800;
        }

        /* フッターボタン */
        .action-bar {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .update-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>MEDAKA<br>LOG</h1>
        <div class="last-sync">LAST SYNC 09:30</div>
    </header>

    <section class="main-summary">
        <span class="summary-label">Mixed Main Tank</span>
        <div class="summary-count">120<span class="unit">pcs</span></div>
        <div style="font-size: 0.75rem; margin-top: 12px; color: var(--accent-main);">
            Outdoor / Stable Environment
        </div>
    </section>

    <div class="medaka-grid">
        <div class="medaka-tile selection">
            <div>
                <span class="status-tag" style="color: var(--accent-selection);">Selection</span>
                <span class="breed-name">レックウザ</span>
                <p class="observation">体外光のノリ良好。繁殖用水槽へ移動済み。</p>
            </div>
            <div class="tile-footer">
                <div class="tile-count">8<span class="unit">pcs</span></div>
            </div>
        </div>

        <div class="medaka-tile">
            <div>
                <span class="status-tag">Mixed</span>
                <span class="breed-name">黒豆</span>
                <p class="observation">屋外越冬組。非常にタフで安定している。</p>
            </div>
            <div class="tile-footer">
                <div class="tile-count">25<span class="unit">pcs</span></div>
            </div>
        </div>

        <div class="medaka-tile">
            <div>
                <span class="status-tag">Mixed</span>
                <span class="breed-name">ミックス</span>
                <p class="observation">メイン水槽でのびのび泳いでいる群。</p>
            </div>
            <div class="tile-footer">
                <div class="tile-count">87<span class="unit">pcs</span></div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="update-btn" onclick="location.reload()">
            <span>↻</span> UPDATE LOG
        </button>
    </div>

</body>
</html>
